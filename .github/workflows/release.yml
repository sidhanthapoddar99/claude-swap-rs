# Publish binaries to GitHub Releases.
# Trigger: push a version tag from main, e.g.
#   git tag v0.1.0 && git push origin v0.1.0
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross linker (linux musl)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            mkdir -p .cargo
            printf '[target.aarch64-unknown-linux-musl]\nlinker = "aarch64-linux-gnu-gcc"\n' >> .cargo/config.toml
          fi
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf cswap-${{ matrix.target }}.tar.gz cswap
          if command -v sha256sum >/dev/null; then
            sha256sum cswap-${{ matrix.target }}.tar.gz > cswap-${{ matrix.target }}.tar.gz.sha256
          else
            shasum -a 256 cswap-${{ matrix.target }}.tar.gz > cswap-${{ matrix.target }}.tar.gz.sha256
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: cswap-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/cswap-*.tar.gz*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: cswap-*.tar.gz*
          generate_release_notes: true
